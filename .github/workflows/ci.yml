name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    
    pull_request:
      branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

      # docker
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/docker-api:latest .

      - name: Push Docker Image
        run: docker push ghcr.io/${{ github.repository_owner }}/docker-api:latest
