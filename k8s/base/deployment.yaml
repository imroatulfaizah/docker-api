apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-api

  template:
    metadata:
      labels:
        app: docker-api 

    spec:
      containers:
      - name: docker-api
        image: ghcr.io/imroatulfaizah/docker-api:77c963f

        envFrom:
          - configMapRef:
              name: docker-api-configuration

        ports:
        - containerPort: 8080
